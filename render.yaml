# Render.com blueprint — https://render.com/docs/blueprint-spec
# Deploy: New → Blueprint → pick the adlift-gtm repo → Apply.
services:
  - type: web
    name: adlift-gtm
    runtime: python
    plan: free
    buildCommand: "pip install uv && uv sync --no-dev"
    startCommand: "uv run --no-sync uvicorn gtm_paid_ai_distribution.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GTM_CHAT_BRAIN
        value: stub # set to "claude" in the dashboard once ANTHROPIC_API_KEY is added
      # Add secrets in the Render dashboard (never commit them):
      #   ANTHROPIC_API_KEY, and GTM_GOOGLE_* if using Google Ads.
